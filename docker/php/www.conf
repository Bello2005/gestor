[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000
pm = dynamic
pm.max_children = 10
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5

; Configurar HOME para que PostgreSQL busque certificados en /var/www/.postgresql
env[HOME] = /var/www

; Configurar variables PostgreSQL para SSL sin certificados de cliente
; NO configurar PGSSLCERT, PGSSLKEY, PGSSLROOTCERT
; Al no configurarlos, PostgreSQL usará SSL sin buscar certificados del cliente
env[PGSSLMODE] = prefer