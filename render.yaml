services:
  - type: web
    name: gestor-laravel
    runtime: docker
    plan: free
    dockerCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Sistema de Gestión
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stack
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: gestor-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gestor-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: gestor-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: gestor-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: gestor-db
          property: password
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DRIVER
        value: public
      - key: APP_URL
        fromService:
          type: web
          name: gestor-laravel
          property: defaultDomain
      - key: ASSET_URL
        fromService:
          type: web
          name: gestor-laravel
          property: defaultDomain

  - type: pserv
    name: gestor-db
    plan: free
    engine: postgres
    version: "15.0"
    ipAllowList: []
